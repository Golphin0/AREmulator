<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="maincss.css">
  <style>
  img {
   height: 90vh;
  }
  body {
   display: flex;
   justify-content: center;
   align-items: center;
  }
  .contain {
   display: flex;
   flex-direction: column;
   justify-content: center;
   align-items: center;
  }
  </style>
</head>

<body style="background-color:black;">
<div class="contain">
<img style="margin-bottom:100px;" id="AR" src="AR-.png">
<a href="index.html"><button>Back</button></a>
</div>
</body>
<script>
const params = new URLSearchParams(location.search);

const ID = params.get("id");
const TYPE_RAW = params.get("type");

let TYPE_FOLDER;

if (TYPE_RAW === "MAIN") {
    TYPE_FOLDER = "MainCards";
} else if (TYPE_RAW === "PWM") {
    TYPE_FOLDER = "PhotosWMario";
} else {
    TYPE_FOLDER = TYPE_RAW; // allow direct folder names later
}

// --- CONFIG SYSTEM ---
let cardConfig = {
    prefix: "AR",
    count: 6,
    ext: "png"
};

async function loadConfig() {
    try {
        const res = await fetch(`${TYPE_FOLDER}/cardconfig.txt`);
        const text = await res.text();

        const lines = text.split("\n").map(l => l.trim());

        // safe parsing with defaults
        cardConfig.prefix = lines[0] || "AR";
        cardConfig.count = parseInt(lines[1]) || 6;
        cardConfig.ext = lines[2] || "png";

    } catch (e) {
        console.warn("Failed to load cardconfig.txt, using defaults", e);
    }
}

// --- INIT ---
document.addEventListener("DOMContentLoaded", async () => {
    await loadConfig();

    const img = document.getElementById("AR");
    img.src = `${TYPE_FOLDER}/${cardConfig.prefix}${ID}.${cardConfig.ext}`;
});

// --- CARD CYCLE ---
function nextCard(card) {
    const regex = new RegExp(
        `${TYPE_FOLDER}/${cardConfig.prefix}(\\d+)\\.${cardConfig.ext}$`
    );

    const match = card.src.match(regex);

    let num = match ? parseInt(match[1]) : 1;

    num = (num % cardConfig.count) + 1;

    card.src = `${TYPE_FOLDER}/${cardConfig.prefix}${num}.${cardConfig.ext}`;
}

document.addEventListener("DOMContentLoaded", () => {
    const card = document.getElementById("AR");

    card.addEventListener("click", () => {
        nextCard(card);
    });
});

// --- WAKE LOCK ---
async function keepAwake() {
    try {
        wakeLock = await navigator.wakeLock.request("screen");
        console.log("Wake Lock active");
    } catch (err) {
        console.error(err);
    }
}

keepAwake();
</script>
</html>
