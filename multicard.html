<!DOCTYPE html>
<html>
<head>
  <style>
	img {
	 width:10%;
	 display: inline;
	}
	
	
	button {
	 width:10%;
	 margin-bottom:5%;
	}
  </style>
</head>

<body style="background-color:black;">
<h1 style="color:white;">AREmulator: AR Card Emulation For 3ds Family -- Multicard</h1>
<h3>Select a Card:</h3>
<div>
<img src="AR-.png" id="crd1">
<img src="AR-.png" id="crd2">
<img src="AR-.png" id="crd3">
<img src="AR-.png" id="crd4">
<img src="AR-.png" id="crd5">
<img src="AR-.png" id="crd6">
</div>
</body>
<script>
const urlquery = new URLSearchParams(location.search).get("cds");
const limit = parseInt(urlquery);

for (let i = 1; i <= 6; i++) {
    const card = document.getElementById(`crd${i}`);
	
	if (i > limit && card) {
        card.remove();
    } else {
		card.addEventListener("click", () => {
			const match = card.src.match(/AR([1-6])\.png$/);
			let num = match ? parseInt(match[1]) : 1;
	
			num = (num % 6) + 1; // cycle 1→2→3→4→5→6→1
	
			card.src = `AR${num}.png`;
		});
	}
}
</script>
</html>
