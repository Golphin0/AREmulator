<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="maincss.css">
  <style>
  body {
   flex-direction: column;
  }
  
  div {
   width: 100% !important;
  }
  </style>
</head>

<body>
<div style="flex-direction: column;">
<h1 style="color:white;">AREmulator -- Multicard</h1>
<h3 style="color:white;">Click a card to change it!</h3>
</div>
<br>
<div>
<img src="AR-.png" id="crd1">
<img src="AR-.png" id="crd2">
<img src="AR-.png" id="crd3">
<img src="AR-.png" id="crd4">
<img src="AR-.png" id="crd5">
<img src="AR-.png" id="crd6">
</div>
<a href="index.html"><button>Back</button></a>
</body>
<script>
const urlquery = new URLSearchParams(location.search).get("cds");
const limit = parseInt(urlquery);

for (let i = 1; i <= 6; i++) {
    const card = document.getElementById(`crd${i}`);
	
	if (i > limit && card) {
        card.remove();
    } else {
		card.addEventListener("click", () => {
			const match = card.src.match(/MainCards\/AR([1-6])\.png$/);
			let num = match ? parseInt(match[1]) : 1;
	
			num = (num % 6) + 1; // cycle 1→2→3→4→5→6→1
	
			card.src = `MainCards/AR${num}.png`;
		});
	}
}
document.querySelectorAll("img").forEach(img => {
    img.style.width = (50 / limit) + "vw";
    img.style.height = "auto";
});
async function keepAwake() {
    try {
        wakeLock = await navigator.wakeLock.request('screen');
        console.log('Wake Lock active');
    } catch (err) {
        console.error(err);
        alert(err);
    }
}
keepAwake();
</script>
</html>
